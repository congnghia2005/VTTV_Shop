<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cập Nhật Sản Phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container">
    <div class="row">
        <div class="col-md-8 mx-auto rounded border p-4 m-4 shadow-sm" style="background-color: #f8f9fa;">
            <h2 class="text-center mb-5">Cập Nhật Sản Phẩm</h2>

            <!-- Form gửi về /products/edit?id=... -->
            <form method="post" enctype="multipart/form-data"
                  th:object="${productDto}"
                  th:action="@{/products/edit(id=${product.id})}">

                <!-- 0. ID (Chỉ hiển thị, không cho sửa) -->
                <div class="row mb-3">
                    <label class="col-sm-4 col-form-label">ID Sản Phẩm</label>
                    <div class="col-sm-8">
                        <input type="text" class="form-control-plaintext" readonly th:value="${product.id}">
                    </div>
                </div>

                <!-- 1. Tên Sản Phẩm -->
                <div class="row mb-3">
                    <label class="col-sm-4 col-form-label">Tên Sản Phẩm</label>
                    <div class="col-sm-8">
                        <input class="form-control" th:field="*{name}">
                        <p th:if="${#fields.hasErrors('name')}" th:errorclass="text-danger" th:errors="*{name}"></p>
                    </div>
                </div>

                <!-- 2. Thương Hiệu -->
                <div class="row mb-3">
                    <label class="col-sm-4 col-form-label">Thương Hiệu</label>
                    <div class="col-sm-8">
                        <input class="form-control" th:field="*{brand}">
                        <p th:if="${#fields.hasErrors('brand')}" th:errorclass="text-danger" th:errors="*{brand}"></p>
                    </div>
                </div>

                <!-- 3. Giá Tiền & Số Lượng -->
                <div class="row mb-3">
                    <label class="col-sm-4 col-form-label">Giá & Số Lượng</label>
                    <div class="col-sm-4">
                        <input class="form-control" type="number" step="1000" th:field="*{price}">
                        <p th:if="${#fields.hasErrors('price')}" th:errorclass="text-danger" th:errors="*{price}"></p>
                    </div>
                    <div class="col-sm-4">
                        <input class="form-control" type="number" th:field="*{quantity}">
                        <p th:if="${#fields.hasErrors('quantity')}" th:errorclass="text-danger" th:errors="*{quantity}"></p>
                    </div>
                </div>

                <!-- 4. Kích Cỡ & Màu Sắc -->
                <div class="row mb-3">
                    <label class="col-sm-4 col-form-label">Size & Màu</label>
                    <div class="col-sm-4">
                        <input class="form-control" th:field="*{sizes}">
                        <p th:if="${#fields.hasErrors('sizes')}" th:errorclass="text-danger" th:errors="*{sizes}"></p>
                    </div>
                    <div class="col-sm-4">
                        <input class="form-control" th:field="*{colors}">
                        <p th:if="${#fields.hasErrors('colors')}" th:errorclass="text-danger" th:errors="*{colors}"></p>
                    </div>
                </div>

                <!-- 5. Mô Tả -->
                <div class="row mb-3">
                    <label class="col-sm-4 col-form-label">Mô Tả</label>
                    <div class="col-sm-8">
                        <textarea class="form-control" rows="3" th:field="*{description}"></textarea>
                        <p th:if="${#fields.hasErrors('description')}" th:errorclass="text-danger" th:errors="*{description}"></p>
                    </div>
                </div>

                <!-- 6. Hình Ảnh (Phần quan trọng nhất) -->
                <div class="row mb-3">
                    <label class="col-sm-4 col-form-label">Hình Ảnh</label>
                    <div class="col-sm-8">
                        <!-- Hiển thị ảnh cũ -->
                        <div class="mb-2">
                            <img th:src="@{'/images/' + ${product.image}}" width="100" class="img-thumbnail" alt="Ảnh hiện tại">
                            <span class="text-muted ms-2">(Ảnh hiện tại)</span>
                        </div>

                        <!-- Input chọn ảnh mới -->
                        <input class="form-control" type="file" th:field="*{imageFile}">
                        <p th:if="${#fields.hasErrors('imageFile')}" th:errorclass="text-danger" th:errors="*{imageFile}"></p>
                        <div class="form-text">Để trống nếu muốn giữ nguyên ảnh cũ.</div>
                    </div>
                </div>

                <!-- Nút Bấm -->
                <div class="row">
                    <div class="offset-sm-4 col-sm-4 d-grid">
                        <button type="submit" class="btn btn-primary">Cập Nhật</button>
                    </div>
                    <div class="col-sm-4 d-grid">
                        <a class="btn btn-outline-secondary" href="/products" role="button">Hủy Bỏ</a>
                    </div>
                </div>

            </form>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
